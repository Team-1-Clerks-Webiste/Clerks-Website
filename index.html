<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Clerks</title>
  </head>
  <body>
    <script src="./js/navbar.js"></script>

    <section class="hero">
      <div class="hero-content">
        <span class="hero-label">NEW COLLECTION</span>
        <h1>Step Into<br />Your Perfect Pair</h1>
        <p class="hero-subtitle">Premium footwear for every occasion.</p>
        <a href="./pages/shop.html"
          ><button class="btn shop">Shop Now</button></a
        >
      </div>
      <div class="hero-empty"></div>
    </section>
    <section class="catologue" id="catalogue">
      <!-- Populated dynamically from API -->
    </section>
    <script src="./js/cart.js"></script>
    <script src="./js/nav.js"></script>
    <script src="./js/footer.js"></script>
    <script src="./js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        let shoes = [];
        try {
          const res = await fetch("http://127.0.0.1:8000/shoes");
          shoes = await res.json();
        } catch (e) {
          console.error("Could not fetch shoes:", e);
          return;
        }

        const catalogue = document.getElementById("catalogue");
        const categories = ["Men", "Women", "Kids"];

        categories.forEach((cat) => {
          const catShoes = shoes.filter((s) => s.CATEGORY === cat);
          if (catShoes.length === 0) return;

          const categoryDiv = document.createElement("div");
          categoryDiv.className = "category";

          const heading = document.createElement("h2");
          heading.className = "category-heading";
          heading.textContent = cat;
          categoryDiv.appendChild(heading);

          const grid = document.createElement("div");
          grid.className = "product-grid";

          catShoes.forEach((shoe) => {
            const card = document.createElement("div");
            card.className = "card";
            card.style.cursor = "pointer";

            card.addEventListener("click", (e) => {
              if (e.target.closest(".add-to-bag")) return;
              window.location.href = `./pages/product.html?id=${shoe.ID}`;
            });

            const img = document.createElement("img");
            img.src = `/${shoe.IMAGE}`;
            img.alt = shoe.NAME;

            const cardBody = document.createElement("div");
            cardBody.className = "card-body";

            const name = document.createElement("p");
            name.className = "product-name";
            name.textContent = shoe.NAME;

            const price = document.createElement("p");
            price.className = "product-price";
            price.textContent = `\u00a3${shoe.PRICE}`;

            const btn = document.createElement("button");
            btn.className = "add-to-bag";
            btn.textContent = "Add to Bag";
            btn.addEventListener("click", () => {
              if (typeof addToBag === "function") {
                addToBag(
                  shoe.NAME,
                  `\u00a3${shoe.PRICE}`,
                  `/${shoe.IMAGE}`,
                  shoe.ID,
                );
                btn.textContent = "Added!";
                btn.disabled = true;
                setTimeout(() => {
                  btn.textContent = "Add to Bag";
                  btn.disabled = false;
                }, 2000);
                if (typeof updateCounter === "function") updateCounter();
              }
            });

            cardBody.appendChild(name);
            cardBody.appendChild(price);
            cardBody.appendChild(btn);
            card.appendChild(img);
            card.appendChild(cardBody);
            grid.appendChild(card);
          });

          categoryDiv.appendChild(grid);
          catalogue.appendChild(categoryDiv);
        });
      });
    </script>
  </body>
</html>
