<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="product.css" />
    <title>Clerks - shoping page</title>
  </head>

  <body>
    <script src="../js/navbar.js"></script>

    <div class="page_content">
      <div class="left_content">
        <img src="../assets/kids_sport.png" alt="Shoe" />
      </div>

      <div class="right-content">
        <p class="product-name">Loading...</p>
        <p class="product-colour"></p>

        <p class="product-price"></p>

        <p class="product-reviews"></p>

        <p class="product-available-colours"></p>
        <div class="colour-images">
          <img
            class="colour-image"
            src="../assets/kids_sport.png"
            alt="colour 1"
          />
          <img
            class="colour-image"
            src="../assets/kids_sport.png"
            alt="colour 2"
          />
          <img
            class="colour-image"
            src="../assets/kids_sport.png"
            alt="colour 3"
          />
        </div>

        <p class="product-size">Size:</p>
        <div class="sizes">
          <button class="field_name">Size</button>
          <div class="dropdown_content">
            <input type="checkbox" id="size1" value="35.5" /><label for="size1">
              35.5</label
            ><br />
            <input type="checkbox" id="size2" value="37" /><label for="size2">
              37</label
            ><br />
            <input type="checkbox" id="size3" value="38" /><label for="size3">
              38</label
            ><br />
            <input type="checkbox" id="size4" value="39.5" /><label for="size4">
              39.5</label
            ><br />
            <input type="checkbox" id="size5" value="40" /><label for="size5">
              40</label
            ><br />
            <input type="checkbox" id="size6" value="41" /><label for="size6">
              41</label
            ><br />
            <input type="checkbox" id="size7" value="41.5" /><label for="size7">
              41.5</label
            ><br />
            <input type="checkbox" id="size8" value="42" /><label for="size8">
              42</label
            ><br />
            <input type="checkbox" id="size9" value="42.5" /><label for="size9">
              42.5</label
            ><br />
            <input type="checkbox" id="size10" value="43" /><label for="size10">
              43</label
            ><br />
            <input type="checkbox" id="size11" value="44" /><label for="size11">
              44</label
            ><br />
            <input type="checkbox" id="size12" value="44.5" /><label
              for="size12"
            >
              44.5</label
            ><br />
            <input type="checkbox" id="size13" value="45" /><label for="size13">
              45</label
            ><br />
            <input type="checkbox" id="size14" value="46" /><label for="size14">
              46</label
            ><br />
            <input type="checkbox" id="size15" value="47" /><label for="size15">
              47</label
            ><br />
          </div>
        </div>

        <p class="product-description-title">Description</p>
        <p class="product-description"></p>

        <button class="add-to-bag">Add to Bag</button>
      </div>
    </div>

    <script src="../js/footer.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/product.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
