<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./login.css" />
    <title>Clerks — Register</title>
  </head>
  <body>
    <script src="../js/navbar.js"></script>

    <main class="login-page">
      <div class="login-card">
        <span class="login-label">JOIN CLERKS</span>
        <h1>Register</h1>
        <p class="login-sub">Create your Clerks account</p>

        <form class="login-form">
          <div class="field">
            <label for="full-name">Full Name</label>
            <input
              type="text"
              id="full-name"
              name="full-name"
              placeholder="John Smith"
            />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
            />
          </div>
          <div class="field">
            <label for="confirm-password">Confirm Password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="••••••••"
            />
          </div>
          <button type="submit" class="login-btn">Register</button>
        </form>

        <p class="logout-row" style="display: none" id="logout-row">
          <a href="#" id="logout-btn" class="logout-btn" style="display: none"
            >Log out</a
          >
        </p>
        <p class="register-link">
          Already have an account? <a href="./login.html">Sign in</a>
        </p>
      </div>
    </main>
    <script src="../js/cart.js"></script>
    <script src="../js/nav.js"></script>
    <script src="/js/footer.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
