<html>
  <head>
    <title>Checkout Page</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="checkout.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="top-nav"></div>
    <nav>
      <div class="logo">
        <a href="../index.html"><img src="../assets/clerks logo.png" /></a>
      </div>
      <div class="links">
        <ul>
          <li>Men</li>
          <li>Women</li>
          <li>Children</li>
          <li>Sport</li>
          <li>School</li>
          <li><a href="./about-us.html">About</a></li>
          <li>Sale</li>
        </ul>
      </div>
      <div class="icons">
        <input type="text" placeholder=" Search..." />
        <img class="icon" src="../assets/heart.png" />
        <img class="icon" src="../assets/user.png" />
        <a href="./checkout.html">
          <img class="icon" src="../assets/shopping-bag.png" />
        </a>
      </div>
    </nav>

    <main class="checkout-layout">

      <!-- LEFT: cart items -->
      <section class="cart-section" aria-label="Cart items">
        <div class="section-label">YOUR BAG <span class="item-count" id="item-count">(0)</span></div>

        <ul class="cart-list" id="cart-list"></ul>

        <div class="empty-state" id="empty-state">
          <p>Your bag is empty. <a href="../index.html">Continue shopping</a></p>
        </div>
      </section>

      <!-- RIGHT: order summary -->
      <aside class="summary-section" aria-label="Order summary">
        <div class="summary-card">
          <div class="section-label">ORDER SUMMARY</div>

          <div class="summary-line">
            <span class="s-label">Subtotal</span>
            <span class="s-value" id="subtotal">£0.00</span>
          </div>
          <div class="summary-line">
            <span class="s-label">Shipping</span>
            <span class="s-value" id="shipping-display">—</span>
          </div>
          <div class="summary-line promo-line" id="promo-line" hidden>
            <span class="s-label promo-label">Promo discount</span>
            <span class="s-value promo-value" id="promo-display">–£0.00</span>
          </div>

          <div class="summary-divider"></div>

          <div class="summary-line total-line">
            <span class="total-label">TOTAL</span>
            <span class="total-value" id="total-display">£0.00</span>
          </div>

          <!-- Promo code -->
          <div class="promo-row">
            <input type="text" id="promo-input" class="promo-input" placeholder="Promo code" autocomplete="off" onkeydown="if(event.key==='Enter')applyPromo()"/>
            <button class="promo-apply-btn" onclick="applyPromo()">Apply</button>
          </div>
          <p class="promo-msg" id="promo-msg"></p>

          <div class="summary-divider"></div>

          <a href="payment.html" class="proceed-link" id="proceed-link">
            <button class="pay-btn" id="pay-btn" disabled>
              <span class="corner tl"></span>
              <span class="corner tr"></span>
              <span class="corner bl"></span>
              <span class="corner br"></span>
              <span class="btn-inner">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="1" y="3.5" width="14" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M1 6.5h14" stroke="currentColor" stroke-width="1.2"/>
                </svg>
                Proceed to Payment
              </span>
            </button>
          </a>

          <p class="secure-note">
            <svg width="10" height="12" viewBox="0 0 10 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline;vertical-align:middle;margin-right:5px;">
              <rect x="0.6" y="4.6" width="8.8" height="6.8" rx="1" stroke="#6b5a2e" stroke-width="1"/>
              <path d="M2.5 4.6V3A2.5 2.5 0 0 1 7.5 3v1.6" stroke="#6b5a2e" stroke-width="1"/>
            </svg>
            256-bit SSL · Secure encrypted checkout
          </p>
        </div>
      </aside>

    </main>

    <script src="../js/cart.js"></script>
    <script src="../js/nav.js"></script>
    <script>
      const SHIPPING = 2.99;
      let cart = [];
      let promoApplied = false;
      let promoDiscount = 0;

      /* ── Build aggregated cart from localStorage ── */
      function buildCart() {
        const raw = getCart();
        const map = new Map();
        raw.forEach(item => {
          if (map.has(item.name)) {
            map.get(item.name).qty += 1;
          } else {
            map.set(item.name, {
              name: item.name,
              price: parseFloat(item.price.replace(/[^0-9.]/g, '')),
              priceStr: item.price,
              image: item.image,
              qty: 1
            });
          }
        });
        return Array.from(map.values());
      }

      /* ── Persist aggregated cart back to localStorage ── */
      function saveCartToStorage() {
        const flat = [];
        cart.forEach(item => {
          for (let i = 0; i < item.qty; i++) {
            flat.push({ name: item.name, price: item.priceStr, image: item.image });
          }
        });
        saveCart(flat);
      }

      /* ── Render cart ── */
      function renderCart() {
        const list  = document.getElementById('cart-list');
        const empty = document.getElementById('empty-state');

        list.innerHTML = '';

        if (cart.length === 0) {
          empty.style.display = 'flex';
        } else {
          empty.style.display = 'none';
          cart.forEach((item, idx) => {
            const li = document.createElement('li');
            li.className = 'cart-item';
            li.style.animationDelay = `${idx * 0.06}s`;
            li.innerHTML = `
              <div class="item-thumb">
                <img src="${item.image}" alt="${item.name}" />
              </div>
              <div class="item-info">
                <p class="item-name">${item.name}</p>
                <div class="qty-row">
                  <button class="qty-btn" onclick="changeQty(${idx},-1)" aria-label="Decrease quantity">−</button>
                  <span class="qty-num">${item.qty}</span>
                  <button class="qty-btn" onclick="changeQty(${idx},1)" aria-label="Increase quantity">+</button>
                </div>
              </div>
              <div class="item-right">
                <p class="item-price">£${(item.price * item.qty).toFixed(2)}</p>
                <button class="remove-btn" onclick="removeItem(${idx})" aria-label="Remove item">
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                    <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.3"/>
                    <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.3"/>
                  </svg>
                </button>
              </div>
            `;
            list.appendChild(li);
          });
        }

        document.getElementById('item-count').textContent = `(${cart.reduce((s, i) => s + i.qty, 0)})`;
        updateTotals();
      }

      /* ── Qty / Remove ── */
      function changeQty(idx, delta) {
        cart[idx].qty = Math.max(1, cart[idx].qty + delta);
        saveCartToStorage();
        renderCart();
      }

      function removeItem(idx) {
        const items = document.querySelectorAll('.cart-item');
        items[idx].classList.add('removing');
        setTimeout(() => {
          cart.splice(idx, 1);
          saveCartToStorage();
          renderCart();
        }, 280);
      }

      /* ── Totals ── */
      function updateTotals() {
        const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        const shipping = cart.length === 0 ? 0 : SHIPPING;
        const discount = promoApplied ? promoDiscount : 0;
        const total    = Math.max(0, subtotal + shipping - discount);

        document.getElementById('subtotal').textContent         = `£${subtotal.toFixed(2)}`;
        document.getElementById('shipping-display').textContent = cart.length === 0 ? '—' : `£${shipping.toFixed(2)}`;
        document.getElementById('total-display').textContent    = `£${total.toFixed(2)}`;

        const promoLine = document.getElementById('promo-line');
        if (promoApplied && discount > 0) {
          promoLine.removeAttribute('hidden');
          document.getElementById('promo-display').textContent = `–£${discount.toFixed(2)}`;
        } else {
          promoLine.setAttribute('hidden', '');
        }

        const btn  = document.getElementById('pay-btn');
        const link = document.getElementById('proceed-link');
        if (cart.length === 0) {
          btn.setAttribute('disabled', '');
          link.style.pointerEvents = 'none';
        } else {
          btn.removeAttribute('disabled');
          link.style.pointerEvents = '';
        }
      }

      /* ── Promo ── */
      const PROMO_CODES = { 'NEWSITEWHODIS?': 20, 'CLERKS10': 10 };

      function applyPromo() {
        const code = document.getElementById('promo-input').value.trim().toUpperCase();
        const msg  = document.getElementById('promo-msg');
        if (!code) return;
        if (PROMO_CODES[code]) {
          promoDiscount = PROMO_CODES[code];
          promoApplied  = true;
          msg.textContent = `"${code}" applied — £${promoDiscount} off`;
          msg.className   = 'promo-msg success';
        } else {
          msg.textContent = 'Invalid promo code.';
          msg.className   = 'promo-msg error';
          promoApplied    = false;
          promoDiscount   = 0;
        }
        updateTotals();
      }

      /* ── Init ── */
      cart = buildCart();
      renderCart();
    </script>
  </body>
</html>
